<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS-Map</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#05050f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg: #05050f;
            --panel: rgba(117, 130, 255, 0.15);
            --indigo: #7582ff;
            --cyan: #8be9fd;
            --green: #50fa7b;
            --red: #f93111;
            --purple: #bd93f9;
            --dark-purple: #44475a;
            --yellow: #f1fa8c;
        }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--cyan); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { padding: 10px; text-align: center; background: var(--bg); border-bottom: 2px solid var(--indigo); z-index: 1000; flex-shrink: 0; }
        .speed-val { font-size: 3rem; font-weight: bold; color: var(--green); line-height: 1; }
        .unit-label { font-size: 0.9rem; color: #6272a4; font-weight: bold; margin-bottom: 5px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 5px 0; }
        .stat-card { background: var(--panel); padding: 6px; border-radius: 8px; border: 1px solid rgba(139, 233, 253, 0.1); text-align: center; }
        .stat-label { font-size: 0.55rem; color: var(--purple); text-transform: uppercase; display: block; }
        .stat-num { font-size: 1rem; color: #fff; font-weight: bold; }

        .controls { display: flex; justify-content: center; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        button { padding: 10px; font-size: 0.75rem; font-weight: bold; border: none; border-radius: 6px; text-transform: uppercase; cursor: pointer; flex: 1; min-width: 70px; }
        
        #startBtn { background: var(--green); color: #000; }
        #pauseBtn { background: var(--yellow); color: #000; display: none; }
        #saveBtn { background: var(--cyan); color: #000; display: none; }
        #stopBtn { background: var(--red); color: #fff; display: none; }
        
        #map-container { position: relative; width: 100%; flex-shrink: 0; overflow: hidden; }
        #map { height: 250px; width: 100%; background: #000; }
        
        #resizer {
            height: 24px;
            background: var(--dark-purple);
            cursor: ns-resize;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid var(--indigo);
            border-bottom: 1px solid var(--indigo);
            touch-action: none;
            z-index: 1002;
        }
        #resizer::after {
            content: "";
            width: 60px;
            height: 6px;
            background: var(--indigo);
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(117, 130, 255, 0.5);
        }

        #mapClock { position: absolute; top: 10px; right: 10px; z-index: 1001; background: rgba(5,5,15,0.85); padding: 5px 12px; border: 1px solid var(--indigo); border-radius: 6px; color: var(--yellow); font-family: monospace; }

        .div-arrow { background: transparent !important; border: none !important; }

        .history { padding: 15px; overflow-y: auto; flex-grow: 1; background: #0a0a1a; min-height: 50px; }
        .history-item { background: var(--panel); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--indigo); }
        
        .view-btn { background: var(--indigo); color: white; margin-top: 8px; width: 100%; padding: 5px; font-size: 0.7rem; border-radius: 4px; }
        .delete-btn { background: #333; color: #f93111; margin-top: 5px; width: 100%; padding: 3px; font-size: 0.6rem; border-radius: 4px; }

        .km-marker { background: var(--purple); border: 2px solid white; border-radius: 50%; color: black; font-weight: bold; text-align: center; font-size: 11px; line-height: 20px; }
    </style>
</head>
<body>

    <div class="header" id="ui-header">
        <select id="timeMode" onchange="updateUI()" style="background:#101020; color:var(--cyan); border:1px solid var(--indigo); margin-bottom:8px; width: 90%;">
            <option value="normal">VANLIG TID (km/h)</option>
            <option value="chms">CHMS TID (km/ch)</option>
        </select>

        <div class="main-display">
            <div class="speed-val" id="curSpeed">0</div>
            <div id="speedUnit" class="unit-label">km/h</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><span class="stat-label">Restid</span><span class="stat-num" id="timer">00:00:00</span></div>
            <div class="stat-card"><span class="stat-label">Sträcka</span><span class="stat-num" id="dist">0.00 km</span></div>
            <div class="stat-card"><span class="stat-label">Maxfart</span><span class="stat-num" id="maxSpeed">0</span></div>
            <div class="stat-card"><span class="stat-label">Snittfart</span><span class="stat-num" id="avgSpeed">0</span></div>
        </div>
        
        <div class="controls">
            <button id="startBtn" onclick="startTracking()">Starta</button>
            <button id="pauseBtn" onclick="togglePause()">Paus</button>
            <button id="saveBtn" onclick="saveTrip()">Spara</button>
            <button id="stopBtn" onclick="stopTracking()">Nollställ</button>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
        <div id="mapClock">00:00:00</div>
    </div>
    
    <div id="resizer"></div>

    <div class="history">
        <h3 style="color: var(--indigo); font-size: 0.9rem; margin: 0 0 10px 0;">HISTORIK</h3>
        <div id="historyList"></div>
    </div>

    <script>
        // --- PWA SERVICE WORKER REGISTRERING ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker registrerad för GPS-Map!', reg.scope))
                .catch(err => console.error('Service Worker fel:', err));
            });
        }

        // --- ORIGINAL KOD BÖRJAR HÄR ---
        let map, polyline, marker, historyLayer;
        let watchId = null, timerInterval = null, isPaused = false;
        let startTime = null, pausedTimeTotal = 0, pauseStartedAt = null;
        let pathCoords = [], totalDistance = 0, currentSpeedMs = 0, maxSpeedMs = 0, lastKmMark = 0;
        const CHMS_HOUR_IN_SEC = 4320; 

        const resizer = document.getElementById('resizer');
        const mapDiv = document.getElementById('map');
        const headerDiv = document.getElementById('ui-header');
        let isResizing = false;

        const startResize = (e) => { 
            isResizing = true; 
            document.body.style.cursor = 'ns-resize';
            e.preventDefault(); 
        };
        const stopResize = () => { isResizing = false; document.body.style.cursor = 'default'; };

        resizer.addEventListener('mousedown', startResize);
        resizer.addEventListener('touchstart', startResize, {passive: false});
        window.addEventListener('mouseup', stopResize);
        window.addEventListener('touchend', stopResize);

        window.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            performResize(e.clientY);
        });

        window.addEventListener('touchmove', (e) => {
            if (!isResizing) return;
            performResize(e.touches[0].clientY);
        }, { passive: false });

        function performResize(clientY) {
            const headerHeight = headerDiv.offsetHeight;
            let newHeight = clientY - headerHeight;
            
            const minHeight = 60; 
            const maxHeight = window.innerHeight - headerHeight - 80; 

            if (newHeight < minHeight) newHeight = minHeight;
            if (newHeight > maxHeight) newHeight = maxHeight;

            mapDiv.style.height = newHeight + 'px';
            if(map) map.invalidateSize();
        }

        function initMap() {
            map = L.map('map', { maxZoom: 20 }).setView([62.0, 15.0], 5);
            L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
                maxZoom: 20, subdomains: ['mt0','mt1','mt2','mt3'], attribution: '© Google'
            }).addTo(map);
            polyline = L.polyline([], { color: '#7582ff', weight: 6, opacity: 1.0 }).addTo(map);
            historyLayer = L.layerGroup().addTo(map);
            loadHistory();
        }

        function getChmsTime(date) {
            const startOfDay = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            const chmsTotalSec = ((date - startOfDay) / 1000 / 86400) * 200000;
            return `${Math.floor(chmsTotalSec / 10000)}:${String(Math.floor((chmsTotalSec % 10000) / 100)).padStart(2,'0')}:${String(Math.floor(chmsTotalSec % 100)).padStart(2,'0')}`;
        }

        function startTracking() {
            if (!navigator.geolocation) return alert("Ingen GPS.");
            historyLayer.clearLayers();
            startTime = new Date(); pausedTimeTotal = 0; totalDistance = 0; maxSpeedMs = 0; lastKmMark = 0; pathCoords = []; isPaused = false;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'inline-block';
            document.getElementById('saveBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'inline-block';
            timerInterval = setInterval(updateUI, 100);
            watchId = navigator.geolocation.watchPosition(pos => {
                if (isPaused) return;
                const newPos = [pos.coords.latitude, pos.coords.longitude];
                currentSpeedMs = pos.coords.speed || 0;
                if (currentSpeedMs > maxSpeedMs) maxSpeedMs = currentSpeedMs;
                if (pathCoords.length > 0) {
                    totalDistance += L.latLng(pathCoords[pathCoords.length-1]).distanceTo(L.latLng(newPos));
                    let currentKm = Math.floor(totalDistance / 1000);
                    if (currentKm > lastKmMark) {
                        lastKmMark = currentKm;
                        L.marker(newPos, { icon: L.divIcon({ className: 'km-marker', html: lastKmMark, iconSize: [22, 22] }) }).addTo(map);
                    }
                }
                pathCoords.push(newPos);
                polyline.setLatLngs(pathCoords);
                map.setView(newPos, map.getZoom() < 18 ? 18 : map.getZoom());
                const arrowHtml = `<div style="transform: rotate(${pos.coords.heading || 0}deg);"><svg width="30" height="30" viewBox="0 0 100 100"><path d="M50 5 L90 95 L50 75 L10 95 Z" fill="#bd93f9" stroke="#44475a" stroke-width="8"/></svg></div>`;
                if (!marker) {
                    marker = L.marker(newPos, {icon: L.divIcon({html: arrowHtml, className:'div-arrow', iconSize:[30,30], iconAnchor:[15,15]})}).addTo(map);
                } else { marker.setLatLng(newPos); marker.setIcon(L.divIcon({html: arrowHtml, className:'div-arrow', iconSize:[30,30], iconAnchor:[15,15]})); }
            }, null, {enableHighAccuracy: true});
        }

        function saveTrip() {
            if (pathCoords.length < 2) return alert("Ingen rutt!");
            const mode = document.getElementById('timeMode').value;
            const factor = (mode === 'chms') ? (4320 / 1000) : 3.6;
            const trip = { id: Date.now(), date: new Date().toLocaleString(), dist: (totalDistance / 1000).toFixed(2), max: Math.round(maxSpeedMs * factor), time: document.getElementById('timer').innerText, unit: (mode === 'chms') ? "km/ch" : "km/h", route: pathCoords };
            let trips = JSON.parse(localStorage.getItem('indigo_trips_v7') || '[]');
            trips.unshift(trip);
            localStorage.setItem('indigo_trips_v7', JSON.stringify(trips));
            loadHistory();
            alert("Resa sparad!");
        }

        function loadHistory() {
            const list = document.getElementById('historyList');
            let trips = JSON.parse(localStorage.getItem('indigo_trips_v7') || '[]');
            list.innerHTML = trips.map(t => `<div class="history-item"><strong>${t.date}</strong><br>Sträcka: ${t.dist} km | Max: ${t.max} ${t.unit}<br>Tid: ${t.time}<button class="view-btn" onclick="viewRoute(${t.id})">VISA RUTT</button><button class="delete-btn" onclick="deleteTrip(${t.id})">Radera</button></div>`).join('');
        }

        function viewRoute(id) {
            let trips = JSON.parse(localStorage.getItem('indigo_trips_v7') || '[]');
            const trip = trips.find(t => t.id === id);
            if (trip) {
                historyLayer.clearLayers();
                const historicalLine = L.polyline(trip.route, {color: '#bd93f9', weight: 5, dashArray: '10, 10'}).addTo(historyLayer);
                map.fitBounds(historicalLine.getBounds());
            }
        }

        function deleteTrip(id) {
            if(confirm("Radera?")) {
                let trips = JSON.parse(localStorage.getItem('indigo_trips_v7') || '[]');
                trips = trips.filter(t => t.id !== id);
                localStorage.setItem('indigo_trips_v7', JSON.stringify(trips));
                loadHistory();
            }
        }

        function togglePause() {
            isPaused = !isPaused;
            const btn = document.getElementById('pauseBtn');
            if (isPaused) { pauseStartedAt = new Date(); btn.innerText = "Kör"; }
            else { pausedTimeTotal += (new Date() - pauseStartedAt); btn.innerText = "Paus"; }
        }

        function stopTracking() { location.reload(); }

        function updateUI() {
            const mode = document.getElementById('timeMode').value;
            const now = new Date();
            document.getElementById('mapClock').innerText = (mode === 'chms') ? getChmsTime(now) : now.toLocaleTimeString();
            if (startTime) {
                let diffMs = (isPaused ? pauseStartedAt : now) - startTime - pausedTimeTotal;
                let sTotal = Math.max(0, diffMs / 1000);
                if (mode === 'chms') {
                    let cs = (sTotal / 86400) * 200000;
                    document.getElementById('timer').innerText = `${Math.floor(cs/10000)}h ${Math.floor((cs%10000)/100)}m ${Math.floor(cs%100)}s`;
                } else {
                    document.getElementById('timer').innerText = `${String(Math.floor(sTotal/3600)).padStart(2,'0')}:${String(Math.floor((sTotal%3600)/60)).padStart(2,'0')}:${String(Math.floor(sTotal%60)).padStart(2,'0')}`;
                }
                let factor = (mode === 'chms') ? (4320 / 1000) : 3.6;
                document.getElementById('curSpeed').innerText = Math.round((isPaused ? 0 : currentSpeedMs) * factor);
                document.getElementById('maxSpeed').innerText = Math.round(maxSpeedMs * factor);
                document.getElementById('avgSpeed').innerText = sTotal > 0 ? Math.round((totalDistance / sTotal) * factor) : 0;
                document.getElementById('speedUnit').innerText = (mode === 'chms') ? "km/ch" : "km/h";
                document.getElementById('dist').innerText = (totalDistance / 1000).toFixed(2) + " km";
            }
        }
        window.onload = initMap;
    </script>
</body>
</html>
